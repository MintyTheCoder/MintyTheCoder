<svg width="700" height="260" viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03110d"/>
      <stop offset="100%" stop-color="#051a14"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <rect width="100%" height="1" fill="#000000" opacity="0.12"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="700" height="260" rx="14" fill="url(#bg)" stroke="#065f46" stroke-width="1.5"/>
  <rect x="0" y="34" width="700" height="226" rx="0" fill="url(#scanlines)"/>

  <rect x="0" y="0" width="700" height="34" rx="14" fill="#022c22"/>
  <rect x="0" y="20" width="700" height="14" fill="#022c22"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="17" r="6" fill="#27c93f"/>
  <text x="350" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#6ee7b7">montgomery@vt-engineering: ~</text>

  <g font-family="JetBrains Mono, monospace" font-size="14" fill="#d1fae5" filter="url(#glow)">
    <text x="30" y="70" fill="#34D399" font-weight="bold">montgomery@vt-engineering</text>
    <text x="30" y="88" fill="#065f46">--------------------------</text>

    <text x="30" y="112"><tspan fill="#34D399">OS:</tspan> Virginia Tech</text>
    <text x="30" y="134"><tspan fill="#34D399">Uptime:</tspan> 2 semesters, still compiling</text>
    <text x="30" y="156"><tspan fill="#34D399">Shell:</tspan> /bin/cpp</text>
    <text x="30" y="178"><tspan fill="#34D399">Terminal:</tspan> VS Code</text>
    <text x="30" y="200"><tspan fill="#34D399">CPU:</tspan> curiosity @ turbo clock</text>
    <text x="30" y="222"><tspan fill="#34D399">Status:</tspan> <tspan fill="#6ee7b7">online, building</tspan></text>
  </g>

  <g transform="translate(560, 85)">
    <circle cx="45" cy="45" r="44" fill="none" stroke="#065f46" stroke-width="2"/>
    <circle cx="45" cy="45" r="30" fill="none" stroke="#34D399" stroke-width="2"/>
    <circle cx="45" cy="45" r="7" fill="#34D399">
      <animate attributeName="r" values="7;9;7" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="45" y1="1" x2="45" y2="15" stroke="#34D399" stroke-width="2"/>
    <line x1="45" y1="75" x2="45" y2="89" stroke="#34D399" stroke-width="2"/>
    <line x1="1" y1="45" x2="15" y2="45" stroke="#34D399" stroke-width="2"/>
    <line x1="75" y1="45" x2="89" y2="45" stroke="#34D399" stroke-width="2"/>
    <line x1="14" y1="14" x2="24" y2="24" stroke="#065f46" stroke-width="2"/>
    <line x1="66" y1="66" x2="76" y2="76" stroke="#065f46" stroke-width="2"/>
    <line x1="76" y1="14" x2="66" y2="24" stroke="#065f46" stroke-width="2"/>
    <line x1="24" y1="66" x2="14" y2="76" stroke="#065f46" stroke-width="2"/>
  </g>

  <rect x="30" y="236" width="9" height="16" fill="#34D399">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
