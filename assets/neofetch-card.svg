<svg width="620" height="320" viewBox="0 0 620 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03110d"/>
      <stop offset="100%" stop-color="#051a14"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <rect width="100%" height="1" fill="#000000" opacity="0.12"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="620" height="320" rx="14" fill="url(#bg)" stroke="#065f46" stroke-width="1.5"/>
  <rect x="0" y="34" width="620" height="286" rx="0" fill="url(#scanlines)"/>

  <rect x="0" y="0" width="620" height="34" rx="14" fill="#022c22"/>
  <rect x="0" y="20" width="620" height="14" fill="#022c22"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="17" r="6" fill="#27c93f"/>
  <text x="310" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#6ee7b7">montgomery@vt-engineering</text>

  <g font-family="JetBrains Mono, monospace" font-size="14" filter="url(#glow)">
    <text x="30" y="70"><tspan fill="#34D399">montgomery@vt-engineering</tspan><tspan fill="#6ee7b7"> ~ $ </tspan><tspan fill="#d1fae5">sysinfo</tspan></text>

    <text x="30" y="96" fill="#065f46">--------------------------</text>

    <g fill="#d1fae5">
      <text x="30" y="120"><tspan fill="#34D399">OS:</tspan> Virginia Tech</text>
      <text x="30" y="142"><tspan fill="#34D399">Distro:</tspan> Dual Degree (CompE + CS)</text>
      <text x="30" y="164"><tspan fill="#34D399">Kernel:</tspan> Chip-Scale Integration</text>
      <text x="30" y="186"><tspan fill="#34D399">Uptime:</tspan> 2 semesters</text>
      <text x="30" y="208"><tspan fill="#34D399">Languages:</tspan> C, C++, Java, C#</text>
      <text x="30" y="230"><tspan fill="#34D399">Editor:</tspan> VS Code</text>
      <text x="30" y="252"><tspan fill="#34D399">Status:</tspan> <tspan fill="#6ee7b7">online, building</tspan></text>
    </g>
  </g>

  <!-- chip graphic -->
  <g transform="translate(415, 108)" filter="url(#glow)">
    <!-- pins -->
    <g stroke="#34D399" stroke-width="3">
      <line x1="20" y1="-14" x2="20" y2="0"/>
      <line x1="45" y1="-14" x2="45" y2="0"/>
      <line x1="70" y1="-14" x2="70" y2="0"/>
      <line x1="95" y1="-14" x2="95" y2="0"/>

      <line x1="20" y1="130" x2="20" y2="144"/>
      <line x1="45" y1="130" x2="45" y2="144"/>
      <line x1="70" y1="130" x2="70" y2="144"/>
      <line x1="95" y1="130" x2="95" y2="144"/>

      <line x1="-14" y1="20" x2="0" y2="20"/>
      <line x1="-14" y1="45" x2="0" y2="45"/>
      <line x1="-14" y1="70" x2="0" y2="70"/>
      <line x1="-14" y1="95" x2="0" y2="95"/>

      <line x1="115" y1="20" x2="129" y2="20"/>
      <line x1="115" y1="45" x2="129" y2="45"/>
      <line x1="115" y1="70" x2="129" y2="70"/>
      <line x1="115" y1="95" x2="129" y2="95"/>
    </g>

    <!-- chip body -->
    <rect x="0" y="0" width="115" height="130" rx="8" fill="#03110d" stroke="#34D399" stroke-width="2.5"/>

    <!-- inner circuit traces -->
    <g stroke="#065f46" stroke-width="1.5" fill="none">
      <rect x="18" y="18" width="79" height="94" rx="4"/>
      <line x1="18" y1="45" x2="97" y2="45"/>
      <line x1="18" y1="85" x2="97" y2="85"/>
      <line x1="45" y1="18" x2="45" y2="112"/>
      <line x1="70" y1="18" x2="70" y2="112"/>
    </g>

    <!-- pulsing core -->
    <rect x="45" y="53" width="25" height="25" rx="4" fill="#34D399">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g font-family="JetBrains Mono, monospace" font-size="14" filter="url(#glow)">
    <text x="30" y="290" fill="#34D399">montgomery@vt-engineering <tspan fill="#6ee7b7">~ $</tspan></text>
    <rect x="280" y="276" width="9" height="16" fill="#34D399">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
